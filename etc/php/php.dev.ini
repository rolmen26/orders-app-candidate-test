[PHP]
; Error reporting (completo en desarrollo)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /dev/stderr

; Assertions (útil para testing y debugging)
zend.assertions = 1
assert.active = 1
assert.exception = 1

; Memory & execution
memory_limit = 512M
max_execution_time = 300
max_input_time = 300

; File uploads (para fotos de miembros, documentos)
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Date & timezone
date.timezone = America/Mexico_City

; Sessions (usando archivos en desarrollo, no Redis)
session.save_handler = files
session.save_path = "/tmp"
session.cookie_secure = 0
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.gc_maxlifetime = 7200
session.gc_probability = 1
session.gc_divisor = 100

; Opcache (deshabilitado en desarrollo para hot-reload)
opcache.enable = 0
opcache.enable_cli = 0

; Realpath cache (bajo en desarrollo)
realpath_cache_size = 4M
realpath_cache_ttl = 600

; Output buffering
output_buffering = 4096

; Other settings
expose_php = On
short_open_tag = Off
precision = 14
serialize_precision = -1


; PHP 8.3 Specific Settings
; Incluir argumentos en stack traces (mejor debugging)
zend.exception_ignore_args = 0

; Variables de entorno
variables_order = "EGPCS"

; Configuración de desarrollo Laravel
; Permite var_dump colorido en CLI
cli_server.color = 1
